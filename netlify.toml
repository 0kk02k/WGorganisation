[build]
command = "cd netlify/functions && npm install && cd ../../frontend && yarn install && yarn build"
publish = "frontend/build"
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "20"
ENABLE_HEALTH_CHECK = "false"

# API-Routes: alle /api/* gehen an die api.js Function
[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200
force = true

# SPA-Routing für React Router (muss letzter Redirect sein!)
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production.environment]
NODE_ENV = "production"

[context.deploy-preview.environment]
NODE_ENV = "production"

[context.branch-deploy.environment]
NODE_ENV = "production"
